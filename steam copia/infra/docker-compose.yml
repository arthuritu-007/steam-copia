services:
  postgres:
    image: postgres:16
    container_name: steam-copia-postgres
    environment:
      POSTGRES_DB: steam_copia
      POSTGRES_USER: steam
      POSTGRES_PASSWORD: steam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: steam-copia-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

