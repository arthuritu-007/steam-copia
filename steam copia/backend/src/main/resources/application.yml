server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/steam_copia}
    username: ${DB_USER:steam}
    password: ${DB_PASSWORD:steam}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    issuer: ${JWT_ISSUER:steam-copia}
    secret: ${JWT_SECRET:change-me-in-dev}
    accessTokenMinutes: ${JWT_ACCESS_MINUTES:60}

